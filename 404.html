<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Smart Travel Planner</title>
    <script>
      // GitHub Pages SPA redirect trick
      // Redirects 404s back to index.html preserving the path
      // so that client-side routing (wouter) works correctly.
      var segmentCount = 1; // number of path segments in the repo name
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
